<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech 文字轉語音</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔊 Text-to-Speech 文字轉語音</h1>
            <p>使用 Web Speech API 將文字轉換為語音</p>
        </header>

        <main>
            <div class="input-section">
                <label for="text-input">輸入要轉換的文字：</label>
                <textarea 
                    id="text-input" 
                    rows="6" 
                    placeholder="在此輸入您想要轉換成語音的文字..."
                >Hello! This is a text-to-speech demo using the Web Speech API.</textarea>
            </div>

            <div class="controls-section">
                <div class="control-group">
                    <label for="voice-select">選擇語音：</label>
                    <select id="voice-select"></select>
                </div>

                <div class="control-group">
                    <label for="rate-input">語速：<span id="rate-value">1</span></label>
                    <input type="range" id="rate-input" min="0.5" max="2" step="0.1" value="1">
                </div>

                <div class="control-group">
                    <label for="pitch-input">音調：<span id="pitch-value">1</span></label>
                    <input type="range" id="pitch-input" min="0" max="2" step="0.1" value="1">
                </div>

                <div class="control-group">
                    <label for="volume-input">音量：<span id="volume-value">1</span></label>
                    <input type="range" id="volume-input" min="0" max="1" step="0.1" value="1">
                </div>
            </div>

            <div class="button-section">
                <button id="speak-btn" class="btn btn-primary">
                    <span class="btn-icon">▶️</span> 開始播放
                </button>
                <button id="pause-btn" class="btn btn-secondary" disabled>
                    <span class="btn-icon">⏸️</span> 暫停
                </button>
                <button id="resume-btn" class="btn btn-secondary" disabled>
                    <span class="btn-icon">▶️</span> 繼續
                </button>
                <button id="stop-btn" class="btn btn-danger" disabled>
                    <span class="btn-icon">⏹️</span> 停止
                </button>
            </div>

            <div class="status-section">
                <p id="status">準備就緒</p>
            </div>
        </main>

        <footer>
            <p>📚 參考資料：<a href="https://developer.mozilla.org/en-US/docs/Web/API/Web_Speech_API/Using_the_Web_Speech_API" target="_blank">MDN Web Speech API</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
